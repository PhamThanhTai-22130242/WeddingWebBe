app.google.client-id=525681019331-o9slm19otvkehlmo8rnogrl3mm4qfqab.apps.googleusercontent.com

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:deteblak9}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:wedding}
cloudinary.folder=${CLOUDINARY_FOLDER:wedding}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
